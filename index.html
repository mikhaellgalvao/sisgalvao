<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webview - Galvão Drones</title>
    <!-- Importando o Tailwind CSS para um design rápido, responsivo e moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /* Configurando as cores da Galvão Drones no Tailwind */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        galvaoGreen: '#0E5847',
                        galvaoOrange: '#EF7E13',
                    }
                }
            }
        }
    </script>
    <!-- Ícones Lucide para um toque profissional -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 h-screen w-screen overflow-hidden flex flex-col">

    <!-- Cabeçalho / Barra Superior do Webview -->
    <header class="bg-galvaoGreen border-b-4 border-galvaoOrange text-white shadow-lg z-10 flex items-center justify-between px-4 py-3 shrink-0">
        <div class="flex items-center gap-3">
            <!-- Ícone simulando um drone/tecnologia -->
            <div class="p-2 bg-galvaoOrange rounded-lg shadow-sm">
                <i data-lucide="plane" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Galvão Drones</h1>
                <p class="text-xs text-galvaoOrange font-medium tracking-wide uppercase">Visualizador Web</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 text-sm font-medium">
            <!-- Botão de Atualizar que recarrega o iframe -->
            <button onclick="document.getElementById('webview-frame').src = document.getElementById('webview-frame').src" 
                    class="hover:text-galvaoOrange transition-colors flex items-center gap-1" title="Atualizar Página">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Atualizar</span>
            </button>
            <a href="https://www.galvaodrones.com.br" target="_blank" class="hover:text-galvaoOrange transition-colors flex items-center gap-1">
                <i data-lucide="external-link" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Site Oficial</span>
            </a>
        </div>
    </header>

    <!-- Área Principal do Webview (Iframe) -->
    <!-- A classe flex-grow garante que o iframe ocupe todo o espaço restante abaixo do cabeçalho -->
    <main class="flex-grow w-full h-full relative bg-gray-900">
        <!-- Indicador de carregamento simples (fica atrás do iframe) -->
        <div class="absolute inset-0 flex items-center justify-center text-white/50 z-0">
            <div class="flex flex-col items-center gap-2">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-galvaoOrange"></i>
                <p class="text-sm">Iniciando conexão...</p>
            </div>
        </div>

        <!-- O Iframe atuando como Webview -->
        <!-- O atributo allow="fullscreen" permite que vídeos ou elementos internos fiquem em tela cheia -->
        <iframe 
            id="webview-frame"
            src="https://galvaodrones.lovable.app" 
            class="w-full h-full border-none relative z-10 bg-white"
            allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            title="App Webview">
        </iframe>
    </main>

    <!-- Inicializa os ícones -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
